name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate documentary brief fixture
        run: |
          pip install jsonschema
          python -c "
          import json, jsonschema
          from pathlib import Path
          root = Path('packages/schemas')
          schema = json.loads((root / 'json/documentary-brief.schema.json').read_text())
          inst = json.loads((root / 'fixtures/documentary-brief-valid.json').read_text())
          jsonschema.validate(instance=inst, schema=schema)
          for name in (
              'director-pack.schema.json',
              'research-dossier.schema.json',
              'chapter-outline-batch.schema.json',
              'chapter-scripts-batch.schema.json',
              'scene-plan-batch.schema.json',
          ):
              json.loads((root / 'json' / name).read_text())
          print('ok')
          "

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API package
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check director_api
      - name: Import app
        run: python -c "from director_api.main import app; print(app.title)"
      - name: Pytest
        run: pytest -q

  ffmpeg-pipelines:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ffmpeg-pipelines
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check ffmpeg_pipelines
      - name: Pytest
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install and build
        run: npm ci && npm run build
