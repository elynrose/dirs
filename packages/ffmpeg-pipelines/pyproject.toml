[project]
name = "ffmpeg-pipelines"
version = "0.1.0"
description = "FFmpeg filter graphs and compile helpers for Directely exports"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "ruff>=0.8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Parent directories may contain a .gitignore (e.g. repo root). Hatchling applies
# the first one it finds and can skip traversing ignored paths, which omitted
# modules like audio_slot.py from the wheel even though they live under ffmpeg_pipelines/.
[tool.hatch.build]
ignore-vcs = true

[tool.hatch.build.targets.wheel]
packages = ["ffmpeg_pipelines"]
# Hatch occasionally omitted these modules from the wheel; keep them explicit.
[tool.hatch.build.targets.wheel.force-include]
"ffmpeg_pipelines/audio_slot.py" = "ffmpeg_pipelines/audio_slot.py"
"ffmpeg_pipelines/nt_staging.py" = "ffmpeg_pipelines/nt_staging.py"
"ffmpeg_pipelines/video_to_duration.py" = "ffmpeg_pipelines/video_to_duration.py"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
