# Reverse proxy for Directely Studio on directely.com
# Install: sudo cp scripts/nginx/directely.com.conf /etc/nginx/sites-available/directely.com
#          sudo ln -sf /etc/nginx/sites-available/directely.com /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS: sudo certbot --nginx -d directely.com -d www.directely.com
#
# Requires: `npm run build` in apps/web (static files under dist/).
# API stays on 127.0.0.1:8000; browser calls same-origin /v1 (no VITE_API_BASE_URL).

server {
    listen 80;
    listen [::]:80;
    server_name directely.com www.directely.com;

    root /root/director/apps/web/dist;
    index index.html;

    # Large uploads (media, exports)
    client_max_body_size 256M;

    location /v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
