# Reverse proxy for Directely Studio on directely.com
# Install: sudo cp scripts/nginx/directely.com.conf /etc/nginx/sites-available/directely.com
#          sudo ln -sf /etc/nginx/sites-available/directely.com /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS: sudo certbot --nginx -d directely.com -d www.directely.com
#
# Requires: `npm run build` in apps/web, then deploy static files somewhere nginx can read.
# Do NOT use /root/... for `root` — nginx runs as www-data and cannot traverse /root.
# Example: rsync dist to /var/www/directely (see INSTALLATION.md).
# API stays on 127.0.0.1:8000; browser calls same-origin /v1 (no VITE_API_BASE_URL).
#
# If the Studio loads but every /v1/* request is HTTP 502: nginx is fine; the upstream is down.
# On the server: curl -sS -o /dev/null -w "%{http_code}\n" http://127.0.0.1:8000/v1/health
# Expect 200. If connection refused, start the API (e.g. systemd service or screen + uvicorn).

upstream director_api {
    server 127.0.0.1:8000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name directely.com www.directely.com;

    root /var/www/directely;
    index index.html;

    # Large uploads (media, exports)
    client_max_body_size 256M;

    location /v1/ {
        proxy_pass http://director_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
